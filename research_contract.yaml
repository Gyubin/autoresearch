# =============================================================================
# Research Contract (Layer 1) — PROTECTED FILE
#
# This contract is immutable during autoresearch runs:
#   * It is listed in its own protected_globs, hashed into protection/hashes.json
#     at init, and verified every round.
#   * The orchestrator only ever READS it. Baseline results are recorded in
#     experiments/state.json, never written back here.
#
# To intentionally change the contract: stop all runs, `chmod u+w` the file,
# edit, then re-run `orchestrator.py init --force` to rebuild the manifest.
# =============================================================================
schema_version: 4
contract_id: autoresearch-phase4-refinement

objective: >
  Minimize held-out RMSE of the model trained by src/train.py. Interventions
  may change training hyperparameters (deterministic patcher) or edit code
  under src/** (LLM coding worker). The evaluator, dataset definition, this
  contract, and the orchestrator are immutable during runs.

primary_metric:
  name: heldout_rmse
  direction: minimize
  # Relative epsilon keep-rule: accept a candidate only if it improves the
  # incumbent by at least this fraction. Evaluation is deterministic, so a
  # plain ">" rule would happily accept 1e-9 wiggles.
  min_relative_improvement: 0.002

secondary_metrics:
  - train_rmse
  - generalization_gap
  - train_seconds

editable_globs:
  - "src/**"

protected_globs:
  - "evaluation/**"
  - "research_contract.yaml"
  - "orchestrator.py"
  - "protection/**"
  - "pyproject.toml"
  - "uv.lock"
  - ".python-version"
  # Phase 3: engine code AND corpus are evidence provenance. The (protected)
  # orchestrator imports literature/engine.py, so an unprotected engine
  # would be an integrity hole in the trusted path; a mutable corpus would
  # let evidence drift mid-campaign (citation fraud).
  - "literature/**"

budgets:
  # Must match the hardcoded values in evaluation/evaluate.py; the evaluator
  # never parses this file (it trusts nothing outside evaluation/), and
  # `orchestrator.py init` cross-checks the two once, failing fast on drift.
  smoke_train_timeout_s: 20
  dev_train_timeout_s: 90
  # max_rounds is the EXPERIMENT budget (rNNNN allocator), not generations:
  # a generation of parallel_branches consumes that many rounds.
  max_rounds: 60
  repair_attempts: 2

portfolio:
  # Hypotheses executed in parallel per generation (isolated worktrees).
  # Phase 4: raised 4 -> 8 as a set with halving below — a wider smoke rung
  # feeds a same-cost dev rung. The heuristic proposer still fills at most
  # one hypothesis per parameter (~6), so 8 is an upper bound, not a quota.
  parallel_branches: 8
  # Dev-improving candidates forwarded to the blind admission gate.
  gate_top_k: 2
  # Gate epsilon: the winner must beat the incumbent's gate score by this
  # relative margin. Gate scores are never exposed to proposers/insights.
  gate_min_relative_improvement: 0.001
  # At most this many LLM-coder hypotheses per generation.
  max_coder_hypotheses: 1
  # Optional hard cap on generations (null = bounded by max_rounds only).
  max_generations: null
  # LLM coding worker budgets (per hypothesis).
  coder_max_turns: 25
  coder_max_budget_usd: 1.5
  # Phase 4b successive halving: every branch runs the cheap smoke rung;
  # only max(min_keep, ceil(parallel_branches * keep_fraction)) survivors
  # by smoke score advance to the dev rung. Elimination is a BUDGET policy,
  # never scientific evidence: pruned branches distill no insight.
  halving:
    enabled: true
    keep_fraction: 0.5
    min_keep: 2

stop_conditions:
  # Consecutive generations without an admitted winner.
  stagnation_generations: 4

literature:
  # Phase 3 literature grounding (Blueprint Layer 2). The corpus is an
  # offline mock (fictional claim-level evidence over this task's
  # intervention space); the retrieval backend is swappable for a real
  # OpenAlex/S2 adapter later. Literature NEVER touches scoring: the
  # evaluator does not read this block and no evidence flows gate-ward.
  enabled: true
  corpus_path: "literature/corpus/mock_corpus.json"
  retriever: lexical
  max_evidence_per_generation: 12
  max_evidence_per_hypothesis: 4
  max_queries: 6
  # Coverage stop: consecutive queries contributing zero new evidence.
  stabilization_window: 2
  citation_hops: 1
  # Per-grounding-call cap (SDK-enforced) and optional campaign total
  # (enforced by summing experiments/evidence/evidence.jsonl; exhaustion
  # degrades to lexical grounding, mode "claude+budget_exhausted").
  llm_max_budget_usd: 0.5
  llm_max_campaign_budget_usd: null

refinement:
  # Phase 4a directed branch refinement (Gome-style search momentum +
  # evidence-based move steering). enabled=false restores the exact Phase 3
  # proposal behaviour (static priority + last-accepted-first). Momentum is
  # a pure fold over experiment ledger records — dev signals and
  # accept/reject bits only; gate scores cannot enter by construction.
  enabled: true
  # Geometric decay applied to every momentum score at each generation
  # boundary, so stale directions fade.
  momentum_decay: 0.5
  # Fraction of a generation's slots that follow the steered ranking; the
  # rest (at least 1 when k >= 2) are reserved for unexplored directions —
  # zero momentum and no literature support (anti hypothesis-collapse).
  exploit_fraction: 0.75
  # Consecutive accepts in one (param, direction) before the proposer may
  # take one accelerated (squared) step per generation.
  accelerate_after: 2
  # Rank heuristic moves by literature stance (supports first, contradicted
  # moves demoted — never removed). Requires literature.enabled.
  evidence_steering: true

pairwise_gate:
  # Phase 4c SciNav-style pairwise SELECTION (opt-in per run via
  # `run --gate pairwise`; this block only permits and parameterizes it).
  # Admission is ALWAYS the deterministic scalar epsilon rule on the blind
  # gate split; when >= 2 candidates pass it, anonymized blind judges pick
  # which one is admitted. Judges never see gate scores (their input is the
  # contract, hypothesis certificates, bounded code diffs and dev metrics),
  # and every vote is recorded in the gate ledger record next to the
  # counterfactual scalar_winner. Judge failures fall back to the scalar
  # selection deterministically.
  enabled: true
  judges: 3
  # Kept distinct from the proposer/coder model on purpose (ARIS: judges
  # from a different model family — approximated within the Claude family;
  # the true cross-family reviewer is Phase 5).
  judge_model: claude-haiku-4-5
  judge_max_budget_usd: 0.4
  judge_max_campaign_budget_usd: null
